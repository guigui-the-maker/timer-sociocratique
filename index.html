<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Temps de parole sociocratique</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#f4f6f8;
margin:0;
padding:20px;
display:flex;
flex-direction:column;
min-height:100vh;
}

h1{
text-align:center;
}

.time-controls{
display:flex;
justify-content:center;
align-items:center;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
}

input,button{
padding:10px;
font-size:16px;
border-radius:6px;
border:1px solid #ccc;
}

button{
background:#2b7cff;
color:white;
border:none;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

#applyBtn{
display:none;
}

.participants{
flex:1;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:18px;
margin-bottom:20px;
}

.card{
background:white;
padding:18px;
border-radius:12px;
box-shadow:0 2px 8px rgba(0,0,0,0.15);
text-align:center;
transition:all 0.3s;
}

.speaker{
transform:scale(1.1);
box-shadow:0 0 30px rgba(43,124,255,0.9);
border:3px solid #2b7cff;
}

.delete-mode{
border:3px dashed red;
cursor:pointer;
}

.name{
font-size:20px;
font-weight:bold;
}

.timer{
font-size:36px;
margin:10px 0;
font-weight:bold;
}

.warning{color:orange;}
.danger{color:red;}

.progress{
width:100%;
height:12px;
background:#ddd;
border-radius:6px;
overflow:hidden;
margin-top:10px;
}

.bar{
height:100%;
background:#2b7cff;
}

.orange{background:orange;}
.red{background:red;}

.bottom-controls{
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
padding-top:10px;
border-top:2px solid #ddd;
}

</style>
</head>

<body>

<h1>Temps de parole Sociocratique</h1>

<div class="time-controls">

<label>Temps limite :</label>

<input id="minInput" type="number" value="2" min="0" style="width:70px">
<span>min</span>

<input id="secInput" type="number" value="0" min="0" max="59" style="width:70px">
<span>sec</span>

<button id="applyBtn" onclick="updateLimit()">Appliquer</button>

<button onclick="resetAll()">Réinitialiser les temps</button>

</div>

<div class="participants" id="participants"></div>

<div class="bottom-controls">

<input id="nameInput" placeholder="Nom du participant">

<button onclick="addParticipant()">Ajouter</button>

<button onclick="activateDeleteMode()" style="background:#e74c3c">
Supprimer un participant
</button>

</div>

<script>

let participants=[]
let limit=120
let deleteMode=false

function save(){
localStorage.setItem("sociocracy_data",JSON.stringify({participants,limit}))
}

function load(){

let data=localStorage.getItem("sociocracy_data")

if(data){

let parsed=JSON.parse(data)

participants=parsed.participants||[]
limit=parsed.limit||120

let min=Math.floor(limit/60)
let sec=limit%60

document.getElementById("minInput").value=min
document.getElementById("secInput").value=sec

}

}

function showApply(){
document.getElementById("applyBtn").style.display="inline-block"
}

document.getElementById("minInput").addEventListener("input",showApply)
document.getElementById("secInput").addEventListener("input",showApply)

function formatTime(s){

let m=Math.floor(s/60)
let sec=s%60

return m+":"+(sec<10?"0":"")+sec

}

function addParticipant(){

let name=document.getElementById("nameInput").value.trim()
if(!name) return

participants.push({
name,
time:0,
running:false,
interval:null
})

document.getElementById("nameInput").value=""

save()
render()

}

function updateLimit(){

let min=parseInt(minInput.value)||0
let sec=parseInt(secInput.value)||0

limit=min*60+sec

document.getElementById("applyBtn").style.display="none"

save()
render()

}

function toggle(index){

if(deleteMode){
confirmDelete(index)
return
}

let p=participants[index]

if(p.running){

p.running=false
clearInterval(p.interval)

}else{

participants.forEach(o=>{
o.running=false
clearInterval(o.interval)
})

p.running=true

p.interval=setInterval(()=>{

p.time++
update(index)
save()

},1000)

}

render()

}

function update(index){

let p=participants[index]

let percent=(p.time/limit)*100

let timer=document.getElementById("timer_"+index)
let bar=document.getElementById("bar_"+index)

timer.innerText=formatTime(p.time)
bar.style.width=Math.min(percent,100)+"%"

timer.classList.remove("warning","danger")
bar.classList.remove("orange","red")

if(percent>=100){
timer.classList.add("danger")
bar.classList.add("red")
beep()
}
else if(percent>=90){
timer.classList.add("warning")
bar.classList.add("orange")
}

}

function beep(){

const ctx=new(window.AudioContext||window.webkitAudioContext)()
const osc=ctx.createOscillator()

osc.frequency.value=800
osc.connect(ctx.destination)
osc.start()

setTimeout(()=>osc.stop(),200)

}

function resetAll(){

participants.forEach(p=>{
p.time=0
p.running=false
clearInterval(p.interval)
})

save()
render()

}

function activateDeleteMode(){

deleteMode=true
render()

}

function confirmDelete(index){

let name=participants[index].name

if(confirm("Supprimer "+name+" ?")){

clearInterval(participants[index].interval)
participants.splice(index,1)

save()

}

deleteMode=false
render()

}
function updateLayout(){

let container=document.getElementById("participants")

if(participants.length < 4){
container.style.flex="0"
}else{
container.style.flex="1"
}

}
function render(){

let container=document.getElementById("participants")
container.innerHTML=""

participants.forEach((p,i)=>{

let percent=(p.time/limit)*100

let card=document.createElement("div")

card.className="card"+
(p.running?" speaker":"")+
(deleteMode?" delete-mode":"")

card.onclick=()=>toggle(i)

card.innerHTML=`

<div class="name">${p.name}</div>

<div class="timer" id="timer_${i}">
${formatTime(p.time)}
</div>

<button onclick="event.stopPropagation();toggle(${i})">
${p.running?"Pause":"Parler"}
</button>

<div class="progress">
<div class="bar" id="bar_${i}" style="width:${percent}%"></div>
</div>

`

container.appendChild(card)

})

updateLayout()

}

load()
render()

</script>

</body>
</html>
